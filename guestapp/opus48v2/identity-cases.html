<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chekin Guest — IV use cases (Opus 4.8 v2)</title>
<link rel="stylesheet" href="../../ds/colors_and_type.css">
<link rel="stylesheet" href="_v2.css">
</head>
<body>
<div class="app" style="grid-template-columns:266px 1fr">

  <!-- Sidebar -->
  <aside class="side">
    <div class="prop">
      <div class="av"><svg viewBox="0 0 24 24"><path d="M3 9 12 2l9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg></div>
      <div>
        <div class="name">Puerta del Sol</div>
        <div class="ref">VH-2026-0847</div>
      </div>
    </div>
    <nav>
      <a class="n-item" href="journey.html" style="text-decoration:none;color:inherit">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Home
      </a>
      <div class="sgroup">Before your stay</div>
      <a class="n-item active" href="identity-cases.html" style="text-decoration:none;color:inherit">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="12" r="2.5"/><path d="M14 10h4M14 14h4"/></svg>
        ID verification
        <span class="badge new">DEMO</span>
      </a>
    </nav>
    <div class="me">
      <div class="av">CS</div>
      <div>
        <div class="n">Carmen Specimen</div>
        <div class="e">carmen@email.com</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" style="grid-column:auto">
    <div style="width:100%;max-width:1040px;margin:0 auto">
      <div class="cases-head reveal">
        <div class="kicker">Guest App · IV</div>
        <h1>Identity verification — Use cases</h1>
        <p>Each card opens the IV flow in a specific scenario. Scenarios are controlled by URL parameters: <code>?doc=</code>, <code>?fail=</code>, <code>?selfie=0</code>.</p>
      </div>
      <div class="cgrid" id="grid"></div>
    </div>
  </main>
</div>

<script>
  var V = 'identity.html';
  var ARR = '<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
  var CASES = [
    {tag:'Happy path', cls:'', title:'National ID · complete', desc:'Front and back document + selfie, everything correct.', href:V+'?doc=id'},
    {tag:'Error', cls:'err', title:'Error · front-side reading', desc:'The front-side document reading fails; retry is offered and works.', href:V+'?doc=id&fail=front'},
    {tag:'Error', cls:'err', title:'Error · back-side reading', desc:'The back-side reading fails; retry continues the flow.', href:V+'?doc=id&fail=back'},
    {tag:'Error', cls:'err', title:'Error · selfie reading', desc:'Face detection fails; retry continues the flow.', href:V+'?doc=id&fail=selfie'},
    {tag:'Variant', cls:'', title:'Passport · single capture', desc:'The passport has a single side, so only one image is captured (no back side).', href:V+'?doc=passport'},
    {tag:'Variant', cls:'', title:'No selfie', desc:'IV process without selfie step: document only.', href:V+'?doc=id&selfie=0'}
  ];
  document.getElementById('grid').innerHTML = CASES.map(function(c){
    return '<div class="case '+c.cls+'"><span class="tag">'+c.tag+'</span><h3>'+c.title+'</h3><p>'+c.desc+'</p>'+
      '<a href="'+c.href+'">Open case '+ARR+'</a></div>';
  }).join('');
</script>
</body>
</html>
